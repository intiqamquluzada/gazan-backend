services:
  postgres:
    image: postgres:16-alpine
    container_name: qazan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qazan
      POSTGRES_USER: qazan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - qazan_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qazan -d qazan"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: qazan-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/qazan
      DB_USER: qazan
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: "*"
      SERVER_PORT: "8080"
    expose:
      - "8080"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: qazan-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  qazan_pg_data:
