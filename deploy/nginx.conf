server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for hashed asset files
    location ~* \.(?:css|js|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy — backend routes
    location /api/ {
        client_max_body_size 8m;          # allow photo uploads
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /docs {
        proxy_pass http://backend:8080/docs;
    }
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
    }
    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
    }
    location /actuator/ {
        proxy_pass http://backend:8080/actuator/;
    }

    # Flutter SPA — let the client router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
