services:
  postgres:
    image: postgres:16-alpine
    container_name: qazan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qazan
      POSTGRES_USER: qazan
      POSTGRES_PASSWORD: qazan
    ports:
      - "5432:5432"
    volumes:
      - qazan_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qazan -d qazan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qazan_pg_data:
