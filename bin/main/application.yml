spring:
  application:
    name: qazan-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qazan}
    username: ${DB_USER:qazan}
    password: ${DB_PASSWORD:qazan}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
    cache-duration: PT1H
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  forward-headers-strategy: framework

# ── Application-specific ──────────────────────────────────────
app:
  jwt:
    issuer: qazan-backend
    secret: ${JWT_SECRET:dev-only-secret-please-replace-with-256-bit-key-in-production-env-var}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
  cors:
    # Dev default allows any localhost / 127.0.0.1 port (Flutter web picks
    # a random port). Tighten in prod via CORS_ORIGINS env var.
    allowed-origins: ${CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://10.0.2.2:*}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  default-locale: az
  supported-locales: az,en,ru,tr

# ── Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ── OpenAPI / Swagger UI ─────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
    operations-sorter: alpha
    tags-sorter: alpha
